<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST SCOREBOARD AND STATS</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: transparent; 
            font-family: 'Arial Black', Impact, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
            flex-direction: column;
        }

        .overlay-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .scoreboard {
            display: flex;
            align-items: center;
            background-color: #000000;
            border-radius: 25px;
            height: 60px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
            /* z-index: 10; wurde hier entfernt, damit das Panel sich dahinter schieben kann */
        }

        .scoreboard-side {
            display: flex;
            align-items: center;
            height: 100%;
            position: relative;
        }

        .scoreboard-side.right { padding-right: 20px; }

        .team-container {
            display: flex;
            align-items: center;
            gap: 12px; 
        }

        .scoreboard-side.left .team-container { margin-left: 20px; margin-right: 20px; }
        .scoreboard-side.right .team-container { margin-left: 20px; }

        .scoreboard-side.left::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 135px; /* Überspringt die Uhrzeit für die Symmetrie */
            right: -25px; 
            height: 3px;
            background: linear-gradient(90deg, rgba(235, 65, 65, 0) 0%, rgba(235, 65, 65, 1) 25%, rgba(115, 245, 165, 1) 100%);
            border-radius: 5px 0 0 5px;
            z-index: 1;
        }

        .scoreboard-side.right::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: -25px; 
            right: 30px;
            height: 3px;
            background: linear-gradient(90deg, rgba(240, 240, 120, 1) 0%, rgba(185, 125, 245, 1) 75%, rgba(185, 125, 245, 0) 100%);
            border-radius: 0 5px 5px 0;
            z-index: 1;
        }

        .time-box {
            background-color: #ffffff;
            color: #000000;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 25px;
            border-radius: 25px 10px 10px 25px;
            font-size: 22px; 
            font-weight: bold;
            white-space: nowrap;
            position: relative; 
            overflow: hidden;   
        }

        .goal-overlay {
            position: absolute;
            top: 0;
            right: 0; 
            height: 100%;
            width: 0; 
            background-color: #90f3c5; 
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: inherit;
            letter-spacing: 1px;
            overflow: hidden;
            white-space: nowrap;
            transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
            z-index: 5;
        }

        .goal-overlay.active { width: 100%; }

        .team-name {
            color: #ffffff;
            font-size: 28px;
            text-transform: uppercase;
            line-height: 1;
        }

        .flag {
            width: 40px;
            height: 26px;
            border-radius: 4px;
            object-fit: cover;
        }

        .score-box {
            background-color: #90f3c5;
            color: #00;
            font-size: 32px;
            padding: 5px 15px;
            z-index: 2;
            height: 38px;
            display: flex;
            align-items: center;
        }

        #team1-score { border-radius: 12px 0 0 12px; }
        #team2-score { border-radius: 0 12px 12px 0; }

        /* Neuer Wrapper für Logo und Stats-Panel */
        .logo-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .center-logo {
            background-color: #ffffff;
            height: 70px;
            width: 50px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 10px;
            z-index: 3; 
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        
        .center-logo span { font-size: 24px; line-height: 1; }

        .stats-panel {
            position: absolute;
            top: 60px; 
            left: 50%;
            background-color: rgba(0, 0, 0, 1);
            color: #ffffff;
            width: 380px; /* Feste Breite */
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-family: 'Arial', sans-serif; 
            font-weight: bold;
            font-size: 16px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translate(-50%, -20px); /* Zentriert auf X-Achse */
            z-index: -1; /* Versteckt sich hinter dem Scoreboard */
        }

        .stats-panel.active {
            max-height: 350px;
            opacity: 1;
            transform: translate(-50%, 0);
            padding: 15px 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 30px;
        }

        .stat-label {
            color: #90f3c5;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 160px;
            text-align: center;
        }

        .stat-value {
            width: 50px;
            text-align: center;
            font-size: 18px;
        }
        
        .yellow-card { color: #f1c40f; }
        .red-card { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="overlay-container">
        <div class="scoreboard">
            <div class="scoreboard-side left">
                <div class="time-box" id="match-time">
                    --:--
                    <div class="goal-overlay" id="goal-banner">TOOOR!</div>
                </div>
                <div class="team-container">
                    <img class="flag" id="team1-flag" src="https://via.placeholder.com/40x26/333/FFF?text=?" alt="Team 1">
                    <div class="team-name" id="team1-name">TBA</div>
                </div>
                <div class="score-box" id="team1-score">0</div>
            </div>

            <!-- Wrapper verheiratet das Logo mit dem Stats-Panel -->
            <div class="logo-wrapper">
                <div class="center-logo"><span>🏆</span>FIFA</div>

                <div class="stats-panel" id="stats-panel">
                    <div class="stat-row">
                        <span class="stat-value" id="stat-poss-1">0%</span>
                        <span class="stat-label">Ballbesitz</span>
                        <span class="stat-value" id="stat-poss-2">0%</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-value" id="stat-shots-1">0</span>
                        <span class="stat-label">Schüsse</span>
                        <span class="stat-value" id="stat-shots-2">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-value" id="stat-sog-1">0</span>
                        <span class="stat-label">Schüsse aufs Tor</span>
                        <span class="stat-value" id="stat-sog-2">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-value" id="stat-corners-1">0</span>
                        <span class="stat-label">Eckbälle</span>
                        <span class="stat-value" id="stat-corners-2">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-value" id="stat-freekicks-1">0</span>
                        <span class="stat-label">Freistöße</span>
                        <span class="stat-value" id="stat-freekicks-2">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-value" id="stat-fouls-1">0</span>
                        <span class="stat-label">Fouls</span>
                        <span class="stat-value" id="stat-fouls-2">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-value yellow-card" id="stat-yellow-1">0</span>
                        <span class="stat-label">Gelbe Karten</span>
                        <span class="stat-value yellow-card" id="stat-yellow-2">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-value red-card" id="stat-red-1">0</span>
                        <span class="stat-label">Rote Karten</span>
                        <span class="stat-value red-card" id="stat-red-2">0</span>
                    </div>
                </div>
            </div>

            <div class="scoreboard-side right">
                <div class="score-box" id="team2-score">0</div>
                <div class="team-container">
                    <div class="team-name" id="team2-name">TBA</div>
                    <img class="flag" id="team2-flag" src="https://via.placeholder.com/40x26/333/FFF?text=?" alt="Team 2">
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetTeam = urlParams.get('team') ? urlParams.get('team').toUpperCase() : null;

        let lastScore1 = null;
        let lastScore2 = null;
        let isAnimating = false;
        
        let statsTimer = null;
        let currentHomeId = null;
        let currentAwayId = null;

        // --- TOR ANIMATION ---
        function triggerGoalAnimation() {
            if (isAnimating) return; 
            isAnimating = true;

            const banner = document.getElementById('goal-banner');
            if (banner) {
                banner.classList.add('active');
                setTimeout(() => {
                    banner.classList.remove('active');
                    setTimeout(() => { isAnimating = false; }, 600); 
                }, 5000);
            }
        }

        // --- STATISTIK PANEL TOGGLE (Taste S) ---
        document.addEventListener('keydown', function(event) {
            if (event.key === 's' || event.key === 'S') {
                toggleStatsPanel();
            }
        });

        function toggleStatsPanel() {
            const panel = document.getElementById('stats-panel');
            if (panel.classList.contains('active')) {
                panel.classList.remove('active');
                clearTimeout(statsTimer);
            } else {
                panel.classList.add('active');
                clearTimeout(statsTimer);
                statsTimer = setTimeout(() => {
                    panel.classList.remove('active');
                }, 15000);
            }
        }

        // --- TWITCH CHAT INTEGRATION ---
        // Nur Broadcaster, Mods und VIPs können !livestats auslösen (15s Cooldown)
        const TWITCH_CHANNEL = 'kayzahr';
        const CHAT_COOLDOWN_MS = 15000;
        let lastChatTrigger = 0;

        function hasPermission(rawMessage) {
            const tagsMatch = rawMessage.match(/^@(\S+)/);
            if (!tagsMatch) return false;
            const tags = tagsMatch[1];
            const badgesMatch = tags.match(/(?:^|;)badges=([^;]*)/);
            if (!badgesMatch) return false;
            const badges = badgesMatch[1];
            return (
                badges.includes('broadcaster') ||
                badges.includes('moderator') ||
                badges.includes('vip')
            );
        }

        function connectTwitchChat() {
            const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            ws.onopen = function() {
                ws.send('CAP REQ :twitch.tv/tags');
                ws.send('PASS oauth:no_token_needed');
                ws.send('NICK justinfan' + Math.floor(Math.random() * 999999));
                ws.send('JOIN #' + TWITCH_CHANNEL);
            };

            ws.onmessage = function(event) {
                const raw = event.data;
                if (raw.startsWith('PING')) {
                    ws.send('PONG :tmi.twitch.tv');
                    return;
                }
                if (raw.includes('PRIVMSG')) {
                    const msgMatch = raw.match(/PRIVMSG #\S+ :(.+)/);
                    if (msgMatch) {
                        const message = msgMatch[1].trim().toLowerCase();
                        if (message === '!livestats' && hasPermission(raw)) {
                            const now = Date.now();
                            if (now - lastChatTrigger >= CHAT_COOLDOWN_MS) {
                                lastChatTrigger = now;
                                toggleStatsPanel();
                            }
                        }
                    }
                }
            };

            ws.onerror = function(err) {
                console.error('Twitch WebSocket Fehler:', err);
            };

            ws.onclose = function() {
                console.warn('Twitch WebSocket getrennt – versuche erneute Verbindung in 5s...');
                setTimeout(connectTwitchChat, 5000);
            };
        }

        connectTwitchChat();

        // --- API ABFRAGEN ---
        async function fetchLiveScore() {
            try {
                const response = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard');
                const data = await response.json();
                
                if(data.events && data.events.length > 0) {
                    let match = data.events[0];

                    if (targetTeam) {
                        const foundMatch = data.events.find(event => {
                            const home = event.competitions[0].competitors[0].team.abbreviation.toUpperCase();
                            const away = event.competitions[0].competitors[1].team.abbreviation.toUpperCase();
                            return home === targetTeam || away === targetTeam;
                        });
                        if (foundMatch) match = foundMatch;
                    }

                    const status = match.status;
                    const homeTeam = match.competitions[0].competitors[0];
                    const awayTeam = match.competitions[0].competitors[1];
                    
                    currentHomeId = homeTeam.team.id;
                    currentAwayId = awayTeam.team.id;

                    const currentScore1 = parseInt(homeTeam.score) || 0;
                    const currentScore2 = parseInt(awayTeam.score) || 0;

                    if (lastScore1 !== null && lastScore2 !== null) {
                        if (currentScore1 > lastScore1 || currentScore2 > lastScore2) {
                            triggerGoalAnimation();
                        }
                    }

                    lastScore1 = currentScore1;
                    lastScore2 = currentScore2;

                    let timeText = "--:--";
                    if (status.type.state === "pre") {
                        const kickoff = new Date(match.date);
                        const now = new Date();
                        const diffMs = kickoff - now;
                        if (diffMs > 0) {
                            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
                            const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                            if (diffHours >= 24) {
                                const options = { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' };
                                timeText = kickoff.toLocaleString('de-DE', options);
                            } else if (diffHours > 0) {
                                timeText = `-${diffHours}h ${diffMins}m`;
                            } else {
                                timeText = `-${diffMins} Min`;
                            }
                        } else {
                            timeText = "Anpfiff";
                        }
                    } else if (status.type.name === "STATUS_HALFTIME" || status.type.shortDetail === "HT") {
                        timeText = "HT";
                    } else if (status.type.name === "STATUS_FINAL" || status.type.shortDetail === "FT") {
                        timeText = "FT";
                    } else {
                        timeText = status.displayClock || "00:00";
                    }
                    
                    const timeBox = document.getElementById('match-time');
                    timeBox.firstChild.textContent = timeText + " ";

                    document.getElementById('team1-name').innerText = homeTeam.team.abbreviation;
                    document.getElementById('team1-score').innerText = currentScore1;
                    document.getElementById('team1-flag').src = homeTeam.team.logo;

                    document.getElementById('team2-name').innerText = awayTeam.team.abbreviation;
                    document.getElementById('team2-score').innerText = currentScore2;
                    document.getElementById('team2-flag').src = awayTeam.team.logo;

                    if (status.type.state !== "pre") {
                        fetchMatchStats(match.id);
                    }
                }
            } catch (error) {
                console.error("Fehler beim Abrufen der Live-Daten:", error);
            }
        }

        // --- STATISTIKEN AUSLESEN ---
        async function fetchMatchStats(matchId) {
            try {
                const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/all/summary?event=${matchId}`);
                const data = await res.json();
                
                if (data.boxscore && data.boxscore.teams) {
                    const homeStatsData = data.boxscore.teams.find(t => t.team.id === currentHomeId);
                    const awayStatsData = data.boxscore.teams.find(t => t.team.id === currentAwayId);

                    const getStat = (teamData, statName) => {
                        if (!teamData || !teamData.statistics) return '0';
                        const stat = teamData.statistics.find(s => s.name === statName);
                        return stat ? stat.displayValue : '0';
                    };

                    document.getElementById('stat-poss-1').innerText = getStat(homeStatsData, 'possessionPct') + '%';
                    document.getElementById('stat-poss-2').innerText = getStat(awayStatsData, 'possessionPct') + '%';
                    document.getElementById('stat-shots-1').innerText = getStat(homeStatsData, 'totalShots');
                    document.getElementById('stat-shots-2').innerText = getStat(awayStatsData, 'totalShots');
                    document.getElementById('stat-sog-1').innerText = getStat(homeStatsData, 'shotsOnTarget');
                    document.getElementById('stat-sog-2').innerText = getStat(awayStatsData, 'shotsOnTarget');
                    document.getElementById('stat-corners-1').innerText = getStat(homeStatsData, 'wonCorners');
                    document.getElementById('stat-corners-2').innerText = getStat(awayStatsData, 'wonCorners');
                    document.getElementById('stat-freekicks-1').innerText = getStat(homeStatsData, 'freeKicks');
                    document.getElementById('stat-freekicks-2').innerText = getStat(awayStatsData, 'freeKicks');
                    document.getElementById('stat-fouls-1').innerText = getStat(homeStatsData, 'foulsCommitted');
                    document.getElementById('stat-fouls-2').innerText = getStat(awayStatsData, 'foulsCommitted');
                    document.getElementById('stat-yellow-1').innerText = getStat(homeStatsData, 'yellowCards');
                    document.getElementById('stat-yellow-2').innerText = getStat(awayStatsData, 'yellowCards');
                    document.getElementById('stat-red-1').innerText = getStat(homeStatsData, 'redCards');
                    document.getElementById('stat-red-2').innerText = getStat(awayStatsData, 'redCards');
                }
            } catch (error) {
                console.error("Fehler beim Abrufen der Statistik-Daten:", error);
            }
        }

        // Start
        fetchLiveScore();
        setInterval(fetchLiveScore, 10000);
    </script>
</body>
</html>
