<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM OBS Overlay (Gradient Fix)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; 
            font-family: 'Arial Black', Impact, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
        }

        .scoreboard {
            display: flex;
            align-items: center;
            background-color: #000000;
            border-radius: 25px;
            height: 60px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
        }

        /* JETZT KORRIGIERT: Farbverlauf bleibt unter den Teams & Scores voll sichtbar */
        .scoreboard::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 5%;
            width: 90%;
            height: 3px;
            background: linear-gradient(90deg, 
                rgba(235, 65, 65, 0) 0%,      /* Ganz links: Sanftes Ausfaden */
                rgba(235, 65, 65, 1) 15%,     /* Vollfarbe unter der Flagge */
                rgba(235, 65, 65, 1) 46%,     /* Bleibt vollfarbig bis DIREKT vor das Logo (unter dem U) */
                rgba(0, 0, 0, 0) 48%,         /* Haarscharfer Cut-Out fürs Logo */
                rgba(0, 0, 0, 0) 52%,         /* Haarscharfer Cut-Out fürs Logo */
                rgba(115, 245, 165, 1) 54%,   /* Sofort wieder Vollfarbe Grün nach dem Logo */
                rgba(240, 240, 120, 1) 75%,   /* Schöner Übergang zu Gelb */
                rgba(185, 125, 245, 1) 90%,   /* Übergang zu Lila */
                rgba(185, 125, 245, 0) 100%   /* Ganz rechts: Sanftes Ausfaden */
            );
            border-radius: 5px;
        }

        .time-box {
            background-color: #ffffff;
            color: #000000;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 25px;
            border-radius: 25px 10px 10px 25px;
            font-size: 22px; 
            font-weight: bold;
            white-space: nowrap;
        }

        .team-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 140px;           
            gap: 15px;    
        }

        .team-name {
            color: #ffffff;
            font-size: 28px;
            text-transform: uppercase;
        }

        .flag {
            width: 40px;
            height: 26px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid #333;
        }

        .score-box {
            background-color: #90f3c5;
            color: #000;
            font-size: 32px;
            padding: 5px 15px;
            z-index: 2;
            height: 38px;
            display: flex;
            align-items: center;
        }

        #team1-score {
            border-radius: 12px 0 0 12px;
        }

        #team2-score {
            border-radius: 0 12px 12px 0;
        }

        .center-logo {
            background-color: #ffffff;
            height: 70px;
            width: 50px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 10px;
            z-index: 3;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        
        .center-logo span { font-size: 24px; line-height: 1; }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="time-box" id="match-time">--:--</div>
        
        <div class="team-container">
            <img class="flag" id="team1-flag" src="https://via.placeholder.com/40x26/333/FFF?text=?" alt="Team 1">
            <div class="team-name" id="team1-name">TBA</div>
        </div>

        <div class="score-box" id="team1-score">0</div>
        <div class="center-logo"><span>🏆</span>FIFA</div>
        <div class="score-box" id="team2-score">0</div>

        <div class="team-container">
            <div class="team-name" id="team2-name">TBA</div>
            <img class="flag" id="team2-flag" src="https://via.placeholder.com/40x26/333/FFF?text=?" alt="Team 2">
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetTeam = urlParams.get('team') ? urlParams.get('team').toUpperCase() : null;

        async function fetchLiveScore() {
            try {
                const response = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard');
                const data = await response.json();
                
                if(data.events && data.events.length > 0) {
                    let match = data.events[0];

                    if (targetTeam) {
                        const foundMatch = data.events.find(event => {
                            const home = event.competitions[0].competitors[0].team.abbreviation.toUpperCase();
                            const away = event.competitions[0].competitors[1].team.abbreviation.toUpperCase();
                            return home === targetTeam || away === targetTeam;
                        });
                        
                        if (foundMatch) {
                            match = foundMatch;
                        }
                    }

                    const status = match.status;
                    const homeTeam = match.competitions[0].competitors[0];
                    const awayTeam = match.competitions[0].competitors[1];

                    // Zeit-Logik
                    if (status.type.state === "pre") {
                        const kickoff = new Date(match.date);
                        const now = new Date();
                        const diffMs = kickoff - now;

                        if (diffMs > 0) {
                            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
                            const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                            
                            if (diffHours >= 24) {
                                const options = { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' };
                                document.getElementById('match-time').innerText = kickoff.toLocaleString('de-DE', options);
                            } else if (diffHours > 0) {
                                document.getElementById('match-time').innerText = `-${diffHours}h ${diffMins}m`;
                            } else {
                                document.getElementById('match-time').innerText = `-${diffMins} Min`;
                            }
                        } else {
                            document.getElementById('match-time').innerText = "Anpfiff";
                        }
                    } else if (status.type.name === "STATUS_HALFTIME" || status.type.shortDetail === "HT") {
                        document.getElementById('match-time').innerText = "Halbzeit";
                    } else {
                        document.getElementById('match-time').innerText = status.displayClock || "00:00";
                    }
                    
                    // Teams & Scores befüllen
                    document.getElementById('team1-name').innerText = homeTeam.team.abbreviation;
                    document.getElementById('team1-score').innerText = homeTeam.score;
                    document.getElementById('team1-flag').src = homeTeam.team.logo;

                    document.getElementById('team2-name').innerText = awayTeam.team.abbreviation;
                    document.getElementById('team2-score').innerText = awayTeam.score;
                    document.getElementById('team2-flag').src = awayTeam.team.logo;
                }
            } catch (error) {
                console.error("Fehler beim Abrufen der Live-Daten:", error);
            }
        }

        fetchLiveScore();
        setInterval(fetchLiveScore, 10000);
    </script>
</body>
</html>
