<!DOCTYPE html>
<html lang="de">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tmi.js/1.8.5/tmi.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCOREBOARD AND STATS</title>

    <style>
        /* ====== DEIN ORIGINAL CSS UNVERÄNDERT ====== */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; 
            font-family: 'Arial Black', Impact, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
            flex-direction: column;
        }

        .overlay-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .scoreboard {
            display: flex;
            align-items: center;
            background-color: #000000;
            border-radius: 25px;
            height: 60px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10; 
        }

        .scoreboard-side {
            display: flex;
            align-items: center;
            height: 100%;
            position: relative;
        }

        .scoreboard-side.right { padding-right: 20px; }

        .team-container {
            display: flex;
            align-items: center;
            gap: 12px; 
        }

        .scoreboard-side.left .team-container { margin-left: 20px; margin-right: 20px; }
        .scoreboard-side.right .team-container { margin-left: 20px; }

        .time-box {
            background-color: #ffffff;
            color: #000000;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 25px;
            border-radius: 25px 10px 10px 25px;
            font-size: 22px; 
            font-weight: bold;
            white-space: nowrap;
            position: relative; 
            overflow: hidden;   
        }

        .goal-overlay {
            position: absolute;
            top: 0;
            right: 0; 
            height: 100%;
            width: 0; 
            background-color: #90f3c5; 
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: width 0.6s ease;
        }

        .goal-overlay.active { width: 100%; }

        .team-name { color:#fff; font-size:28px; text-transform:uppercase; }

        .flag { width:40px; height:26px; object-fit:cover; }

        .score-box {
            background:#90f3c5;
            color:#000;
            font-size:32px;
            padding:5px 15px;
        }

        .stats-panel {
            position:absolute;
            top:60px;
            left:22%;
            width:70%;
            background:rgba(0,0,0,0.85);
            color:#fff;
            max-height:0;
            overflow:hidden;
            transition:all .5s ease;
        }

        .stats-panel.active {
            max-height:350px;
            padding:15px 0;
        }

        .stat-row {
            display:flex;
            justify-content:space-between;
            padding:4px 30px;
        }
    </style>
</head>

<body>

<div class="overlay-container">

    <div class="scoreboard">
        <div class="scoreboard-side left">
            <div class="time-box" id="match-time">
                --:--
                <div class="goal-overlay" id="goal-banner">TOOOR!</div>
            </div>

            <div class="team-container">
                <img class="flag" id="team1-flag">
                <div class="team-name" id="team1-name">TBA</div>
            </div>

            <div class="score-box" id="team1-score">0</div>
        </div>

        <div class="center-logo">🏆 FIFA</div>

        <div class="scoreboard-side right">
            <div class="score-box" id="team2-score">0</div>

            <div class="team-container">
                <div class="team-name" id="team2-name">TBA</div>
                <img class="flag" id="team2-flag">
            </div>
        </div>
    </div>

    <div class="stats-panel" id="stats-panel">
        <div class="stat-row"><span id="stat-poss-1">0%</span> Ballbesitz <span id="stat-poss-2">0%</span></div>
        <div class="stat-row"><span id="stat-shots-1">0</span> Schüsse <span id="stat-shots-2">0</span></div>
    </div>

</div>

<script>
/* =========================
   STATE
========================= */
let lastScore1=null;
let lastScore2=null;
let statsTimer=null;
let currentHomeId=null;
let currentAwayId=null;

/* =========================
   GOAL
========================= */
function triggerGoalAnimation(){
    const b=document.getElementById("goal-banner");
    b.classList.add("active");
    setTimeout(()=>b.classList.remove("active"),3000);
}

/* =========================
   STATS TOGGLE
========================= */
document.addEventListener("keydown",(e)=>{
    if(e.key.toLowerCase()==="s") toggleStats();
});

function toggleStats(){
    const p=document.getElementById("stats-panel");

    p.classList.toggle("active");

    clearTimeout(statsTimer);

    if(p.classList.contains("active")){
        statsTimer=setTimeout(()=>p.classList.remove("active"),15000);
    }
}

/* =========================
   TWITCH CHAT (FIXED SAFE)
========================= */
let client=null;

function initTwitch(){
    if(typeof tmi==="undefined") return;

    client=new tmi.Client({
        channels:["radonolski"]
    });

    client.connect().catch(console.error);

    client.on("message",(channel,tags,message,self)=>{
        if(self) return;

        const msg=message.trim().toLowerCase();

        if(msg==="!stats"){
            toggleStats();
        }
    });
}

initTwitch();

/* =========================
   LIVE SCORE
========================= */
async function fetchLiveScore(){
    try{
        const res=await fetch("https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard");
        const data=await res.json();

        let match=data.events?.[0];
        if(!match) return;

        const home=match.competitions[0].competitors[0];
        const away=match.competitions[0].competitors[1];

        currentHomeId=home.team.id;
        currentAwayId=away.team.id;

        const s1=parseInt(home.score)||0;
        const s2=parseInt(away.score)||0;

        if(lastScore1!==null && (s1>lastScore1 || s2>lastScore2)){
            triggerGoalAnimation();
        }

        lastScore1=s1;
        lastScore2=s2;

        document.getElementById("team1-name").innerText=home.team.abbreviation;
        document.getElementById("team2-name").innerText=away.team.abbreviation;

        document.getElementById("team1-score").innerText=s1;
        document.getElementById("team2-score").innerText=s2;

        document.getElementById("team1-flag").src=home.team.logo;
        document.getElementById("team2-flag").src=away.team.logo;

        document.getElementById("match-time").firstChild.textContent=match.status.displayClock+" ";

    }catch(err){
        console.error(err);
    }
}

fetchLiveScore();
setInterval(fetchLiveScore,10000);

</script>

</body>
</html>
