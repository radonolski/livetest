<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Test SCOREBOARD AND STATS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; 
            font-family: 'Arial Black', Impact, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
            flex-direction: column;
        }

        .overlay-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .scoreboard {
            display: flex;
            align-items: center;
            background-color: #000000;
            border-radius: 25px;
            height: 60px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10; 
        }

        .scoreboard-side {
            display: flex;
            align-items: center;
            height: 100%;
            position: relative;
        }

        .scoreboard-side.right { padding-right: 20px; }

        .team-container {
            display: flex;
            align-items: center;
            gap: 12px; 
        }

        .scoreboard-side.left .team-container { margin-left: 20px; margin-right: 20px; }
        .scoreboard-side.right .team-container { margin-left: 20px; }

        /* LINKE LINIE */
        .scoreboard-side.left::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 30px;
            right: -25px; 
            height: 3px;
            background: linear-gradient(90deg, rgba(235, 65, 65, 0) 0%, rgba(235, 65, 65, 1) 25%, rgba(115, 245, 165, 1) 100%);
            border-radius: 5px 0 0 5px;
            z-index: 1;
        }

        /* RECHTE LINIE */
        .scoreboard-side.right::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: -25px; 
            right: 30px;
            height: 3px;
            background: linear-gradient(90deg, rgba(240, 240, 120, 1) 0%, rgba(185, 125, 245, 1) 75%, rgba(185, 125, 245, 0) 100%);
            border-radius: 0 5px 5px 0;
            z-index: 1;
        }

        .time-box {
            background-color: #ffffff;
            color: #000000;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 25px;
            border-radius: 25px 10px 10px 25px;
            font-size: 22px; 
            font-weight: bold;
            white-space: nowrap;
            position: relative; 
            overflow: hidden;   
        }

        .goal-overlay {
            position: absolute;
            top: 0;
            right: 0; 
            height: 100%;
            width: 0; 
            background-color: #90f3c5; 
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: inherit;
            letter-spacing: 1px;
            overflow: hidden;
            white-space: nowrap;
            transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
            z-index: 5;
        }

        .goal-overlay.active { width: 100%; }

        .team-name {
            color: #ffffff;
            font-size: 28px;
            text-transform: uppercase;
            line-height: 1;
        }

        .flag {
            width: 40px;
            height: 26px;
            border-radius: 4px;
            object-fit: cover;
        }

        .score-box {
            background-color: #90f3c5;
            color: #000;
            font-size: 32px;
            padding: 5px 15px;
            z-index: 2;
            height: 38px;
            display: flex;
            align-items: center;
        }

        #team1-score { border-radius: 12px 0 0 12px; }
        #team2-score { border-radius: 0 12px 12px 0; }

        .center-logo {
            background-color: #ffffff;
            height: 70px;
            width: 50px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 10px;
            z-index: 3; 
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        
        .center-logo span { font-size: 24px; line-height: 1; }

        /* --- STATISTIK PANEL CSS --- */
        .stats-panel {
            position: absolute;
            top: 60px; 
            left: 22%;
            
            background-color: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            width: 70%; 
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-family: 'Arial', sans-serif; 
            font-weight: bold;
            font-size: 16px;
            
            /* Animations-Setup für mehr Zeilen angepasst */
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateY(-20px);
            z-index: 5;
        }

        .stats-panel.active {
            max-height: 350px; /* Erhöht für 8 Zeilen */
            opacity: 1;
            transform: translateY(0);
            padding: 15px 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 30px; /* Minimal weniger Padding, damit es kompakt bleibt */
        }

        .stat-label {
            color: #90f3c5;
            font-size: 13px; /* Minimal verkleinert für längere Wörter */
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 160px;
            text-align: center;
        }

        .stat-value {
            width: 50px;
            text-align: center;
            font-size: 18px;
        }
        
        /* Karten-Farben für die Statistik */
        .yellow-card { color: #f1c40f; }
        .red-card { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="overlay-container">
        <div class="scoreboard">
            <div class="scoreboard-side left">
                <div class="time-box" id="match-time">
                    --:--
                    <div class="goal-overlay" id="goal-banner">TOOOR!</div>
                </div>
                <div class="team-container">
                    <img class="flag" id="team1-flag" src="https://via.placeholder.com/40x26/333/FFF?text=?" alt="Team 1">
                    <div class="team-name" id="team1-name">TBA</div>
                </div>
                <div class="score-box" id="team1-score">0</div>
            </div>

            <div class="center-logo"><span>🏆</span>FIFA</div>

            <div class="scoreboard-side right">
                <div class="score-box" id="team2-score">0</div>
                <div class="team-container">
                    <div class="team-name" id="team2-name">TBA</div>
                    <img class="flag" id="team2-flag" src="https://via.placeholder.com/40x26/333/FFF?text=?" alt="Team 2">
                </div>
            </div>
        </div>

        <div class="stats-panel" id="stats-panel">
            <div class="stat-row">
                <span class="stat-value" id="stat-poss-1">0%</span>
                <span class="stat-label">Ballbesitz</span>
                <span class="stat-value" id="stat-poss-2">0%</span>
            </div>
            <div class="stat-row">
                <span class="stat-value" id="stat-shots-1">0</span>
                <span class="stat-label">Schüsse</span>
                <span class="stat-value" id="stat-shots-2">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-value" id="stat-sog-1">0</span>
                <span class="stat-label">Schüsse aufs Tor</span>
                <span class="stat-value" id="stat-sog-2">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-value" id="stat-corners-1">0</span>
                <span class="stat-label">Eckbälle</span>
                <span class="stat-value" id="stat-corners-2">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-value" id="stat-freekicks-1">0</span>
                <span class="stat-label">Freistöße</span>
                <span class="stat-value" id="stat-freekicks-2">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-value" id="stat-fouls-1">0</span>
                <span class="stat-label">Fouls</span>
                <span class="stat-value" id="stat-fouls-2">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-value yellow-card" id="stat-yellow-1">0</span>
                <span class="stat-label">Gelbe Karten</span>
                <span class="stat-value yellow-card" id="stat-yellow-2">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-value red-card" id="stat-red-1">0</span>
                <span class="stat-label">Rote Karten</span>
                <span class="stat-value red-card" id="stat-red-2">0</span>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/lib/tmi.min.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetTeam = urlParams.get('team') ? urlParams.get('team').toUpperCase() : null;

    let lastScore1 = null, lastScore2 = null, isAnimating = false, statsTimer = null, currentHomeId = null, currentAwayId = null;

    // --- VERBESSERTER TWITCH CHAT ---
    function initTwitchChat() {
        const script = document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/lib/tmi.min.js";
        script.onload = () => {
            console.log("TMI.js geladen, verbinde...");
            const client = new tmi.Client({
                connection: { reconnect: true, secure: true },
                channels: ['radonolski'] // HIER DEINEN NAMEN EINTRAGEN
            });
    
            client.connect().then(() => {
                console.log("Erfolgreich mit Twitch verbunden!");
            }).catch((err) => {
                console.error("Verbindungsfehler:", err);
            });
    
            client.on('message', (channel, tags, message, self) => {
                console.log("Nachricht empfangen:", message); // Zum Testen, ob überhaupt etwas ankommt
                if (message.toLowerCase().trim() === '!stats') {
                    console.log("Befehl !stats erkannt!");
                    toggleStatsPanel();
                }
            });
        };
        document.head.appendChild(script);
    }
    initTwitchChat();

    // --- ALTE FUNKTIONEN ---
    function triggerGoalAnimation() {
        if (isAnimating) return; 
        isAnimating = true;
        const banner = document.getElementById('goal-banner');
        if (banner) {
            banner.classList.add('active');
            setTimeout(() => { banner.classList.remove('active'); setTimeout(() => { isAnimating = false; }, 600); }, 5000);
        }
    }

    function toggleStatsPanel() {
        const panel = document.getElementById('stats-panel');
        if (panel.classList.contains('active')) {
            panel.classList.remove('active');
            clearTimeout(statsTimer);
        } else {
            panel.classList.add('active');
            clearTimeout(statsTimer);
            statsTimer = setTimeout(() => { panel.classList.remove('active'); }, 15000);
        }
    }

    document.addEventListener('keydown', (e) => { if (e.key === 's' || e.key === 'S') toggleStatsPanel(); });

    async function fetchLiveScore() {
        try {
            const response = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard');
            const data = await response.json();
            if(!data.events || data.events.length === 0) return;

            let match = data.events[0];
            if (targetTeam) {
                const foundMatch = data.events.find(e => e.competitions[0].competitors[0].team.abbreviation.toUpperCase() === targetTeam || e.competitions[0].competitors[1].team.abbreviation.toUpperCase() === targetTeam);
                if (foundMatch) match = foundMatch;
            }

            const homeTeam = match.competitions[0].competitors[0];
            const awayTeam = match.competitions[0].competitors[1];
            currentHomeId = homeTeam.team.id;
            currentAwayId = awayTeam.team.id;

            const s1 = parseInt(homeTeam.score) || 0;
            const s2 = parseInt(awayTeam.score) || 0;

            if (lastScore1 !== null && (s1 > lastScore1 || s2 > lastScore2)) triggerGoalAnimation();
            lastScore1 = s1; lastScore2 = s2;

            document.getElementById('match-time').firstChild.textContent = (match.status.type.state === "pre" ? "Anpfiff" : (match.status.displayClock || match.status.type.shortDetail)) + " ";
            document.getElementById('team1-name').innerText = homeTeam.team.abbreviation;
            document.getElementById('team1-score').innerText = s1;
            document.getElementById('team1-flag').src = homeTeam.team.logo;
            document.getElementById('team2-name').innerText = awayTeam.team.abbreviation;
            document.getElementById('team2-score').innerText = s2;
            document.getElementById('team2-flag').src = awayTeam.team.logo;

            if (match.status.type.state !== "pre") fetchMatchStats(match.id);
        } catch (e) { console.error("Score Error:", e); }
    }

    async function fetchMatchStats(mId) {
        try {
            const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/all/summary?event=${mId}`);
            const data = await res.json();
            if (!data.boxscore) return;
            const h = data.boxscore.teams.find(t => t.team.id === currentHomeId);
            const a = data.boxscore.teams.find(t => t.team.id === currentAwayId);
            const gs = (t, n) => { const s = t?.statistics.find(x => x.name === n); return s ? s.displayValue : '0'; };
            
            document.getElementById('stat-poss-1').innerText = gs(h, 'possessionPct') + '%';
            document.getElementById('stat-poss-2').innerText = gs(a, 'possessionPct') + '%';
            document.getElementById('stat-shots-1').innerText = gs(h, 'totalShots');
            document.getElementById('stat-shots-2').innerText = gs(a, 'totalShots');
            // ... (restliche Stats analog)
        } catch (e) { console.error("Stats Error:", e); }
    }

    fetchLiveScore();
    setInterval(fetchLiveScore, 10000);
</script>
</body>
</html>
